<app-header />

<main class="container py-5 auth-shell">
  <div class="row justify-content-center">
    <div class="col-12 col-lg-7 col-xl-6">
      <div class="auth-card bg-dark bg-opacity-75 text-white border border-secondary shadow-lg rounded-4">
        <div class="card-body p-4 p-md-5">
          <h2 class="text-center mb-3">Iniciar sesión</h2>
          <p class="text-center text-secondary mb-4">Entra con tu usuario o correo y empieza a navegar.</p>

          <div *ngIf="alertMessage" class="alert alert-{{ alertType }}" role="alert">
            {{ alertMessage }}
          </div>

          <form (ngSubmit)="onSubmit()" novalidate>
            <div class="mb-3">
              <label for="loginIdentifier" class="form-label">Usuario o correo</label>
              <input type="text" class="form-control bg-dark text-white border-secondary"
                id="loginIdentifier" name="loginIdentifier"
                [(ngModel)]="formData.identifier" required />
            </div>

            <div class="mb-3">
              <label for="loginPassword" class="form-label">Contraseña</label>
              <input type="password" class="form-control bg-dark text-white border-secondary"
                id="loginPassword" name="loginPassword"
                [(ngModel)]="formData.password" required />
            </div>

            <div class="d-flex flex-column gap-2 mt-4">
              <button type="submit" class="btn btn-primary px-4">Entrar</button>
              <a class="btn btn-outline-light px-4" routerLink="/register">Crear cuenta nueva</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</main>
