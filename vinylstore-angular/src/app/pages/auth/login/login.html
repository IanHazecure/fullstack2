

<main class="login-shell">
   <a routerLink="/">
        <img src="/logo/logo3.png" alt="Logo" class="felynos-logo">
      </a>
  <div class="login-card">
    <h2>Iniciar sesión</h2>
    <p class="login-subtitle">Inicia sesión o crea tu cuenta</p>

    <div *ngIf="alertMessage" class="alert" [class.alert-danger]="alertType === 'danger'" [class.alert-success]="alertType === 'success'">
      {{ alertMessage }}
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>
      <div class="form-group">
        <label>Usuario o correo</label>
        <input type="text" formControlName="identifier" />
        <div *ngIf="identifier?.invalid && identifier?.touched" class="field-error">
          <span *ngIf="identifier?.errors?.['required']">Este campo es obligatorio.</span>
          <span *ngIf="identifier?.errors?.['minlength']">Mínimo 3 caracteres.</span>
        </div>
      </div>

      <div class="form-group">
        <label>Contraseña</label>
        <input type="password" formControlName="password" />
        <div *ngIf="password?.invalid && password?.touched" class="field-error">
          <span *ngIf="password?.errors?.['required']">Este campo es obligatorio.</span>
          <span *ngIf="password?.errors?.['minlength']">Mínimo 6 caracteres.</span>
        </div>
      </div>

      <div class="form-actions">
        <button type="submit" [disabled]="form.invalid">Entrar</button>
        <a routerLink="/register">Crear cuenta nueva</a>
      </div>
    </form>
  </div>
</main>
