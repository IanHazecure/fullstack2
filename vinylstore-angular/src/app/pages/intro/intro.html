

<app-header />

<main>
<section class="upcoming-banner" routerLink="/upcoming">
  <div class="upcoming-banner-content">
    <span class="upcoming-banner-tag">Próximamente</span>
    <h2>Rough Trade 50: Anniversary Edition</h2>
    <p>Blur · Neutral Milk Hotel · The White Stripes</p>
    <button class="upcoming-banner-btn">Ver lanzamientos →</button>
  </div>
<div class="upcoming-banner-covers">
  <img src="https://ianhazecure.github.io/vinyl-api/covers/blur-roughtrade50.jpg" alt="Blur" />
  <img src="https://ianhazecure.github.io/vinyl-api/covers/nmh-roughtrade50.jpg" alt="Neutral Milk Hotel" />
  <img src="https://ianhazecure.github.io/vinyl-api/covers/elephant-roughtrade50.jpg" alt="White Stripes" />
</div>
</section>

<!-- 
  <h2 id="fav-categories">Categorias</h2> -->
  <section class="categorias">

    <div class="hero-section">
    <div class="hero-slider">
      @for (slide of slides; track $index) {
        <img [src]="slide" class="hero-slide" [class.active]="$index === currentSlide()" />
      }
    </div>
    <div class="hero-text">
      <h1>Felynos</h1>
      <p>Tu tienda de vinilos. Encuentra los mejores discos de Rock, Jazz, Pop y Punk.</p>
    </div>
    
  </div>
  </section>
  
</main>
