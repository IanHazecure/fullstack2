<app-header />

<main>
  <app-category-nav />

  <section class="grid-vinilos">
    <article class="vinilo">
      <img src="/covers/KindofBlue.jpg" alt="Album Jazz 1" />
      <div class="vinilo-content">
        <h3>Kind of Blue</h3>
        <p>Cool Jazz</p>
        <p class="precio">$33.000</p>
        <span class="descuento">Descuento: Si</span>
        <button class="btn-agregar" (click)="addToCart({
          id: 'kindofblue',
          title: 'Kind of Blue',
          genre: 'Cool Jazz',
          price: 33000,
          cover: '/covers/KindofBlue.jpg',
          hasDiscount: true
        })">
          + Agregar al carrito
        </button>
      </div>
    </article>

    <article class="vinilo">
      <img src="/covers/timeout.jpg" alt="Album Jazz 2" />

        <h3>Time Out</h3>

        <p class="precio">$31.000</p>
        <span class="sin-descuento">Descuento: No</span>
        <button class="btn-agregar" (click)="addToCart({
          id: 'timeout',
          title: 'Time Out',
          genre: 'Hard Bop',
          price: 31000,
          cover: '/covers/timeout.jpg',
          hasDiscount: false
        })">
          + Agregar al carrito
        </button>
      </div>
    </article>

    <article class="vinilo">
      <img src="/covers/bluetrain.jpg" alt="Album Jazz 3" />
      <div class="vinilo-content">
        <h3>Blue Train</h3>
        <p>Be-bop</p>
        <p class="precio">$29.000</p>
        <span class="descuento">Descuento: Si</span>
        <button class="btn-agregar" (click)="addToCart({
          id: 'bluetrain',
          title: 'Blue Train',
          genre: 'Be-bop',
          price: 29000,
          cover: '/covers/bluetrain.jpg',
          hasDiscount: true
        })">
          + Agregar al carrito
        </button>
      </div>
    </article>
  </section>

  <a class="nav-volver" href="../index.html">Volver al inicio</a>
