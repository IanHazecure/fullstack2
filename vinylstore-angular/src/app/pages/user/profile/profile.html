<app-header />

<main class="profile-shell">
  <div class="profile-card">
    <h2 class="profile-title">Mi perfil</h2>

    @if (alertMessage()) {
      <div class="alert" [class.alert-success]="alertType() === 'success'"
        [class.alert-danger]="alertType() === 'danger'">
        {{ alertMessage() }}
      </div>
    }

    <form (ngSubmit)="onSubmit()" novalidate>
      <div class="form-group">
        <label>Nombre completo</label>
        <input name="fullName" [(ngModel)]="formData().fullName" required />
      </div>
      <div class="form-group">
        <label>Nombre de usuario</label>
        <input [value]="user()?.username" disabled />
      </div>
      <div class="form-group">
        <label>Correo electrónico</label>
        <input type="email" [value]="user()?.email" disabled />
      </div>
      <div class="form-group">
        <label>Dirección de despacho</label>
        <textarea name="shippingAddress" [(ngModel)]="formData().shippingAddress" rows="3"></textarea>
      </div>

      <hr />
      <h5>Cambiar contraseña</h5>

      <div class="form-group">
        <label>Código de recuperación</label>
        <input type="text" name="recoveryCode" [(ngModel)]="formData().recoveryCode" />
      </div>
      <div class="form-group">
        <label>Nueva contraseña</label>
        <input type="password" name="newPassword" [(ngModel)]="formData().newPassword" />
      </div>

      <div class="form-actions">
        <button type="submit">Guardar cambios</button>
      </div>
    </form>
  </div>
</main>
