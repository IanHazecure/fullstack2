<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mi perfil</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
    <script src="auth.js" defer></script>
    <script src="profile.js" defer></script>
  </head>
  <body>
   <header>
  <div class="container d-flex align-items-center justify-content-between">

    <!-- izq -->
    <div class="d-flex align-items-center gap-2">
      <img src="../logo/logo3.png" alt="Vinilos logo" class="felynos-logo">
      <h1 id="logo-name" class="mb-0">Felynos</h1>
    </div>

<!-- der -->
    <div id="authNav" class="d-flex flex-wrap gap-2 justify-content-center justify-content-md-end">
      <a class="btn btn-outline-light" href="login.html">Iniciar sesión</a>
      <a class="btn btn-outline-light" href="register.html">Registro de usuarios</a>
    </div>

  </div>
</header>

    <main class="container py-5 auth-shell">
      <div class="row justify-content-center">
        <div class="col-12 col-lg-8">
          <div class="auth-card bg-dark bg-opacity-75 text-white border border-secondary shadow-lg rounded-4">
            <div class="card-body p-4 p-md-5">
              <h2 class="text-center mb-3">Mi perfil</h2>
              <div id="profileAlert" class="alert d-none" role="alert" aria-live="polite"></div>

              <form id="profileForm" novalidate>
                <div class="mb-3">
                  <label for="profileFullName" class="form-label">Nombre completo</label>
                  <input id="profileFullName" class="form-control bg-dark text-white border-secondary" required />
                </div>

                <div class="mb-3">
                  <label for="profileUsername" class="form-label">Nombre de usuario</label>
                  <input id="profileUsername" class="form-control bg-dark text-white border-secondary" disabled />
                </div>

                <div class="mb-3">
                  <label for="profileEmail" class="form-label">Correo electrónico</label>
                  <input id="profileEmail" type="email" class="form-control bg-dark text-white border-secondary" disabled />
                </div>

                <div class="mb-3">
                  <label for="profileShipping" class="form-label">Dirección de despacho</label>
                  <textarea id="profileShipping" class="form-control bg-dark text-white border-secondary" rows="3"></textarea>
                </div>

                <hr class="my-3" />
                <h5>Cambiar contraseña</h5>
                <div class="mb-3">
                  <label for="profileNewPassword" class="form-label">Nueva contraseña</label>
                  <input id="profileNewPassword" type="password" class="form-control bg-dark text-white border-secondary" />
                </div>

                <div class="d-flex gap-2 justify-content-end mt-3">
                  <button type="submit" class="btn btn-primary">Guardar cambios</button>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
