<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vinilos</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <script src="auth.js" defer></script>
  </head>
  <body>
<header>
      <div class="container d-flex flex-column flex-md-row align-items-md-center justify-content-between gap-3">
        <h1 id="logo-name" class="mb-0">Vinilos logo</h1>
        <div id="authNav" class="d-flex flex-wrap gap-2 justify-content-center justify-content-md-end">
          <a class="btn btn-outline-light" href="login.html">Iniciar sesión</a>
          <a class="btn btn-outline-light" href="register.html">Registro de usuarios</a>
        </div>
      </div>
    </header>
    <main>
      <nav class="categoria-nav">
        <a href="rock.html">Rock</a> 
        <a href="jazz.html">Jazz</a> 
        <a href="pop.html">Pop</a> 
        <a href="punk.html">Punk</a>
      </nav>

      <section class="grid-vinilos">
        <article class="vinilo">
          <img src="cover/KindofBlue.jpg"alt="Album Jazz 1" />
          <div class="vinilo-content">
            <h3>Kind of Blue</h3>
            <p>Cool Jazz</p>
            <p class="precio">$33.000</p>
            <span class="descuento">Descuento: Si</span>
          </div>
        </article>

        <article class="vinilo">
          <img  src="cover/timeout.jpg" alt="Album Jazz 2" />
          <div class="vinilo-content">
            <h3>Time Out</h3>
            <p>Hard Bop</p>
            <p class="precio">$31.000</p>
            <span class="sin-descuento">Descuento: No</span>
          </div>
        </article>

        <article class="vinilo">
          <img src="cover/BlueTrain.jpg" alt="Album Jazz 3" />
          <div class="vinilo-content">
            <h3>Blue Train</h3>
            <p>Be-bop</p>
            <p class="precio">$29.000</p>
            <span class="descuento">Descuento: Si</span>
          </div>
        </article>
      </section>

      <a class="nav-volver" href="index.html">Volver al inicio</a>
    </main>
  </body>
</html>
