<!DOCTYPE html>
<html lang="es">
  <head>

    <title>Vinilos Jazz</title>
    <link rel="stylesheet" href="styles.css" />

            <h3>Kind of Blue</h3>
            <p>descripcion</p>

        <article class="vinilo">

            <h3>Time Out</h3>
            <p>descripcion</p>
            <p class="precio">$31.00</p>
            <span class="sin-descuento">Descuento: No</span>

        <article class="vinilo">
          <img src="https://via.placeholder.com/400x250?text=Jazz+3" alt="Album Jazz 3" />
          <div class="vinilo-content">
            <h3>Blue Train</h3>
            <p>descripcion</p>

      <a class="nav-volver" href="index.html">Volver al inicio</a>
