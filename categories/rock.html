<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vinilos</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../styles.css" />
    <script src="../auth.js" defer></script>
  </head>
  <body>
   <header>
  <div class="container d-flex align-items-center justify-content-between">

    <!-- izq -->
    <div class="d-flex align-items-center gap-2">
      <img src="../logo/logo3.png" alt="Vinilos logo" class="felynos-logo">
      <h1 id="logo-name" class="mb-0">Felynos</h1>
    </div>

<!-- der -->
    <div id="authNav" class="d-flex flex-wrap gap-2 justify-content-center justify-content-md-end">
      <a class="btn btn-outline-light" href="login.html">Iniciar sesión</a>
      <a class="btn btn-outline-light" href="register.html">Registro de usuarios</a>
    </div>

  </div>
</header>

    <main>
      <nav class="categoria-nav">
        <a href="../categories/rock.html">Rock</a>
        <a href="../categories/jazz.html">Jazz</a>
        <a href="../categories/pop.html">Pop</a>
         <a href="../categories/punk.html">Punk</a>
      </nav>

      <section class="grid-vinilos">
        <article class="vinilo">
          <img src="../cover/tdsotm.png" alt="Album Rock 1" />
          <div class="vinilo-content">
            <h3>Dark Side of the Moon</h3>
            <p>Progressive Rock/Art Rock</p>
            <p class="precio">$42.000</p>
            <span class="descuento">Descuento: Si</span>
          </div>
        </article>

        <article class="vinilo">
          <img src="../cover/Disintegration.jpg" alt="Album Rock 2" />
          <div class="vinilo-content">
            <h3>Disintegration</h3>
            <p>Gothic rock/Alternative rock</p>
            <p class="precio">$36.000</p>
            <span class="sin-descuento">Descuento: No</span>
          </div>
        </article>

        <article class="vinilo">
          <img src="../cover/flatfield.jpg" alt="Album Rock 3" />
          <div class="vinilo-content">
            <h3>In the Flat Field</h3>
            <p>Post-Punk/Dark Glam</p>
            <p class="precio">$39.000</p>
            <span class="descuento">Descuento: Si</span>
          </div>
        </article>
      </section>

      <a class="nav-volver" href="../index.html">Volver al inicio</a>
    </main>
  </body>
</html>
