<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vinilos Rock</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <h1>Rock</h1>
    </header>

    <main>
      <h2>Vinilos populares</h2>

      <section class="grid-vinilos">
        <article class="vinilo">
          <img src="https://via.placeholder.com/400x250?text=Rock+1" alt="Album Rock 1" />
          <div class="vinilo-content">
            <h3>Dark Side of the Moon</h3>
            <p>descripcion</p>
            <p class="precio">$42.000</p>
            <span class="descuento">Descuento: Si</span>
          </div>
        </article>

        <article class="vinilo">
          <img src="https://via.placeholder.com/400x250?text=Rock+2" alt="Album Rock 2" />
          <div class="vinilo-content">
            <h3>Back in Black</h3>
            <p>descripcion</p>
            <p class="precio">$36.000</p>
            <span class="sin-descuento">Descuento: No</span>
          </div>
        </article>

        <article class="vinilo">
          <img src="https://via.placeholder.com/400x250?text=Rock+3" alt="Album Rock 3" />
          <div class="vinilo-content">
            <h3>Led Zeppelin IV</h3>
            <p>descripcion</p>
            <p class="precio">$39.000</p>
            <span class="descuento">Descuento: Si</span>
          </div>
        </article>
      </section>

      <a class="nav-volver" href="index.html">Volver al inicio</a>
    </main>
  </body>
</html>
