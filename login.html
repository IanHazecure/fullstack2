<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Iniciar sesión</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <script src="auth.js" defer></script>
    <script src="login.js" defer></script>
  </head>
  <body>
    <header>
      <div class="container d-flex flex-column flex-md-row align-items-md-center justify-content-between gap-3">
        <h1 id="logo-name" class="mb-0">Vinilos logo</h1>
        <div id="authNav" class="d-flex flex-wrap gap-2 justify-content-center justify-content-md-end">
          <a class="btn btn-outline-light" href="register.html">Registro de usuarios</a>
          <a class="btn btn-outline-light" href="index.html">Volver al inicio</a>
        </div>
      </div>
    </header>

    <main class="container py-5 auth-shell">
      <div class="row justify-content-center">
        <div class="col-12 col-lg-7 col-xl-6">
          <div class="auth-card bg-dark bg-opacity-75 text-white border border-secondary shadow-lg rounded-4">
            <div class="card-body p-4 p-md-5">
              <h2 class="text-center mb-3">Iniciar sesión</h2>
              <p class="text-center text-secondary mb-4">Entra con tu usuario o correo y empieza a navegar.</p>

              <div id="loginAlert" class="alert d-none" role="alert" aria-live="polite"></div>

              <form id="loginForm" novalidate>
                <div class="mb-3">
                  <label for="loginIdentifier" class="form-label">Usuario o correo</label>
                  <input
                    type="text"
                    class="form-control bg-dark text-white border-secondary"
                    id="loginIdentifier"
                    name="loginIdentifier"
                    autocomplete="username"
                    required
                  />
                  <div class="invalid-feedback">Escribe tu usuario o correo.</div>
                </div>

                <div class="mb-3">
                  <label for="loginPassword" class="form-label">Contraseña</label>
                  <input
                    type="password"
                    class="form-control bg-dark text-white border-secondary"
                    id="loginPassword"
                    name="loginPassword"
                    autocomplete="current-password"
                    required
                  />
                  <div class="invalid-feedback">La contraseña es obligatoria.</div>
                </div>

                <div class="d-flex flex-column gap-2 mt-4">
                  <button type="submit" class="btn btn-primary px-4">Entrar</button>
                  <a class="btn btn-outline-light px-4" href="register.html">Crear cuenta nueva</a>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
