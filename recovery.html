<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Recuperar contraseña</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
    <script src="auth.js" defer></script>
    <script src="recovery.js" defer></script>
  </head>
  <body>
    <header>
      <div class="container d-flex flex-column flex-md-row align-items-md-center justify-content-between gap-3">
        <h1 id="logo-name" class="mb-0">Vinilos logo</h1>
        <a class="btn btn-outline-light" href="index.html">Volver al inicio</a>
      </div>
    </header>

    <main class="container py-5 auth-shell">
      <div class="row justify-content-center">
        <div class="col-12 col-lg-7 col-xl-6">
          <div class="auth-card bg-dark bg-opacity-75 text-white border border-secondary shadow-lg rounded-4">
            <div class="card-body p-4 p-md-5">
              <h2 class="text-center mb-3">Recuperar contraseña</h2>
              <div id="recoveryAlert" class="alert d-none" role="alert" aria-live="polite"></div>

              <form id="recoveryForm" novalidate>
                <div class="mb-3 d-flex gap-2 align-items-end">
                  <div style="flex:1">
                    <label for="recIdentifier" class="form-label">Usuario o correo</label>
                    <input id="recIdentifier" class="form-control bg-dark text-white border-secondary" required />
                  </div>
                  <div>
                    <button id="sendCodeBtn" type="button" class="btn btn-outline-light">Obtener código</button>
                  </div>
                </div>

                <div class="mb-3">
                  <label for="recCode" class="form-label">Código de recuperación</label>
                  <input id="recCode" class="form-control bg-dark text-white border-secondary" required />
                </div>

                <div class="mb-3">
                  <label for="recNewPassword" class="form-label">Nueva contraseña</label>
                  <input id="recNewPassword" type="password" class="form-control bg-dark text-white border-secondary" required />
                </div>

                <div class="d-flex gap-2 justify-content-end mt-3">
                  <button class="btn btn-primary" type="submit">Restablecer contraseña</button>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
