<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Administración</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
    <script src="auth.js" defer></script>
    <script src="admin.js" defer></script>
  </head>
  <body>
   <header>
  <div class="container d-flex align-items-center justify-content-between">

    <!-- izq -->
    <div class="d-flex align-items-center gap-2">
      <img src="../logo/logo3.png" alt="Vinilos logo" class="felynos-logo">
      <h1 id="logo-name" class="mb-0">Felynos</h1>
    </div>

<!-- der -->
    <div id="authNav" class="d-flex flex-wrap gap-2 justify-content-center justify-content-md-end">
      <a class="btn btn-outline-light" href="login.html">Iniciar sesión</a>
      <a class="btn btn-outline-light" href="register.html">Registro de usuarios</a>
    </div>

  </div>
</header>

    <main class="container py-5 auth-shell">
      <div class="row justify-content-center">
        <div class="col-12">
          <div class="auth-card bg-dark bg-opacity-75 text-white border border-secondary shadow-lg rounded-4">
            <div class="card-body p-4 p-md-5">
                
              <h2 class="text-center mb-3">Panel</h2>

              <div id="adminAlert" class="alert d-none" role="alert" aria-live="polite"></div>
              <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-3">
                <span id="adminSummary" class="text-secondary"></span>
                
                <a class="btn btn-outline-light btn-sm" href="index.html">Volver al inicio</a>
              </div>

              <div class="table-responsive">
                <table class="table table-dark table-striped align-middle mb-0">
                  <thead>
                    <tr>
                      <th>Nombre</th>
                      <th>Usuario</th>
                      <th>Correo</th>
                      <th>Rol</th>
                      <th>Acciones</th>
                    </tr>
                  </thead>
                  <tbody id="usersTableBody"></tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
