<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vinilos Pop</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <h1>Pop</h1>
    </header>

    <main>
      <h2>Vinilos populares</h2>

      <section class="grid-vinilos">
        <article class="vinilo">
          <img src="https://placehold.co/400x250" alt="Album Pop 1" />
          <div class="vinilo-content">
            <h3>Thriller</h3>
            <p>1</p>
            <p class="precio">$45.000</p>
            <span class="descuento">Descuento: Si</span>
          </div>
        </article>

        <article class="vinilo">
          <img src="https://placehold.co/400x250" alt="Album Pop 2" />
          <div class="vinilo-content">
            <h3>1989</h3>
            <p>2.</p>
            <p class="precio">$38.000</p>
            <span class="sin-descuento">Descuento: No</span>
          </div>
        </article>

        <article class="vinilo">
          <img src="https://placehold.co/400x250" alt="Album Pop 3" />
          <div class="vinilo-content">
            <h3>Future Nostalgia</h3>
            <p>3</p>
            <p class="precio">$34.000</p>
            <span class="descuento">Descuento: Si</span>
          </div>
        </article>
      </section>

      <a class="nav-volver" href="index.html">Volver al inicio</a>
    </main>
  </body>
</html>
